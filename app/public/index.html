<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Load Balancer App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 24px;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .logo p {
      font-size: 13px;
      color: #64748b;
    }

    .badge {
      display: inline-block;
      background: #0d9488;
      color: white;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #0d9488; }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #0f766e; }

    .error {
      margin-top: 14px;
      padding: 10px 14px;
      background: #450a0a;
      border: 1px solid #dc2626;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      display: none;
    }

    .server-info {
      margin-top: 20px;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      font-size: 12px;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="badge">⚡ Nginx Round Robin</span>
      <h1>Load Balancer App</h1>
      <p>Ingresa con tus credenciales</p>
    </div>

    <label>Usuario</label>
    <input type="text" id="username" placeholder="admin" />

    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button onclick="login()">Iniciar sesión</button>

    <div class="error" id="error-msg"></div>

    <div class="server-info" id="server-info">
      Conectando con el balanceador...
    </div>
  </div>

  <script>
    // Mostrar qué backend está respondiendo
    fetch('/api/info')
      .then(r => r.json())
      .then(data => {
        document.getElementById('server-info').innerHTML =
          `🔁 Respondiendo: <strong style="color:#0d9488">${data.backend}</strong>`;
      }).catch(() => {});

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Error al iniciar sesión';
          errEl.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('username', username);
        window.location.href = '/dashboard.html';

      } catch (err) {
        errEl.textContent = 'No se pudo conectar con el servidor';
        errEl.style.display = 'block';
      }
    }

    // Enter para login
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
