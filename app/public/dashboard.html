<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Productos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
    }

    /* NAVBAR */
    nav {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav h1 { font-size: 18px; color: #f1f5f9; }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .backend-badge {
      background: #0d9488;
      color: white;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .logout-btn:hover { background: #334155; color: #f1f5f9; }

    /* MAIN */
    main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .page-header h2 { font-size: 22px; }

    .add-btn {
      background: #0d9488;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn:hover { background: #0f766e; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      width: 440px;
    }

    .modal h3 { font-size: 18px; margin-bottom: 20px; }

    .modal label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    .modal input, .modal textarea {
      width: 100%;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
    }

    .modal textarea { resize: vertical; height: 80px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-save {
      flex: 1;
      padding: 11px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      padding: 11px;
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    /* TABLE */
    .table-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: #0f172a; }

    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 14px 20px;
      border-top: 1px solid #334155;
      font-size: 14px;
      color: #cbd5e1;
    }

    tr:hover td { background: #263348; }

    .price { color: #34d399; font-weight: 600; }

    .action-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      font-weight: 500;
    }

    .edit-btn { background: #1d4ed8; color: white; margin-right: 6px; }
    .del-btn  { background: #dc2626; color: white; }

    .empty {
      text-align: center;
      padding: 40px;
      color: #475569;
    }
  </style>
</head>
<body>

  <nav>
    <h1>📦 Gestión de Productos</h1>
    <div class="nav-right">
      <span class="backend-badge" id="backend-label">🔁 ...</span>
      <span style="color:#64748b; font-size:13px" id="user-label"></span>
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h2>Productos</h2>
      <button class="add-btn" onclick="openModal()">+ Nuevo producto</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="product-list">
          <tr><td colspan="5" class="empty">Cargando productos...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modal-title">Nuevo Producto</h3>
      <input type="hidden" id="product-id">

      <label>Nombre</label>
      <input type="text" id="p-name" placeholder="Ej: Laptop ASUS">

      <label>Descripción</label>
      <textarea id="p-desc" placeholder="Descripción del producto..."></textarea>

      <label>Precio (S/.)</label>
      <input type="number" id="p-price" placeholder="99.99" step="0.01">

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveProduct()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    document.getElementById('user-label').textContent =
      '👤 ' + (localStorage.getItem('username') || '');

    const headers = () => ({
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    });

    // Mostrar qué backend responde
    fetch('/api/info').then(r => r.json()).then(d => {
      document.getElementById('backend-label').textContent = '🔁 ' + d.backend;
    });

    // ── CARGAR PRODUCTOS ──
    async function loadProducts() {
      const res = await fetch('/api/products', { headers: headers() });
      const data = await res.json();
      const tbody = document.getElementById('product-list');

      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No hay productos aún. ¡Agrega uno!</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(p => `
        <tr>
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td>${p.description || '—'}</td>
          <td class="price">S/. ${parseFloat(p.price).toFixed(2)}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editProduct(${p.id},'${escape(p.name)}','${escape(p.description)}',${p.price})">Editar</button>
            <button class="action-btn del-btn" onclick="deleteProduct(${p.id})">Eliminar</button>
          </td>
        </tr>
      `).join('');
    }

    // ── MODAL ──
    function openModal(id = null) {
      document.getElementById('modal-title').textContent = id ? 'Editar Producto' : 'Nuevo Producto';
      document.getElementById('modal').classList.add('active');
      if (!id) {
        document.getElementById('product-id').value = '';
        document.getElementById('p-name').value = '';
        document.getElementById('p-desc').value = '';
        document.getElementById('p-price').value = '';
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    function editProduct(id, name, desc, price) {
      document.getElementById('product-id').value = id;
      document.getElementById('p-name').value = unescape(name);
      document.getElementById('p-desc').value = unescape(desc);
      document.getElementById('p-price').value = price;
      openModal(id);
    }

    // ── CREAR / ACTUALIZAR ──
    async function saveProduct() {
      const id = document.getElementById('product-id').value;
      const body = {
        name: document.getElementById('p-name').value,
        description: document.getElementById('p-desc').value,
        price: parseFloat(document.getElementById('p-price').value)
      };

      const url = id ? `/api/products/${id}` : '/api/products';
      const method = id ? 'PUT' : 'POST';

      await fetch(url, { method, headers: headers(), body: JSON.stringify(body) });
      closeModal();
      loadProducts();
    }

    // ── ELIMINAR ──
    async function deleteProduct(id) {
      if (!confirm('¿Eliminar este producto?')) return;
      await fetch(`/api/products/${id}`, { method: 'DELETE', headers: headers() });
      loadProducts();
    }

    // ── LOGOUT ──
    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    // Cerrar modal al hacer clic fuera
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.id === 'modal') closeModal();
    });

    loadProducts();
  </script>
</body>
</html>
